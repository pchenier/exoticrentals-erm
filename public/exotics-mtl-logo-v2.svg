<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="800" height="280">
  <defs>
    <filter id="glow-main" x="-30%" y="-60%" width="160%" height="220%">
      <feGaussianBlur stdDeviation="8" result="blur-big"/>
      <feGaussianBlur stdDeviation="3" result="blur-sm"/>
      <feMerge>
        <feMergeNode in="blur-big"/>
        <feMergeNode in="blur-sm"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-gold" x="-50%" y="-100%" width="200%" height="300%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#cccccc" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="280" fill="#080808"/>

  <!-- Subtle corner marks — top left -->
  <line x1="50" y1="58" x2="66" y2="58" stroke="#c9a96e" stroke-width="1" opacity="0.7"/>
  <line x1="50" y1="58" x2="50" y2="74" stroke="#c9a96e" stroke-width="1" opacity="0.7"/>

  <!-- Subtle corner marks — top right -->
  <line x1="750" y1="58" x2="734" y2="58" stroke="#c9a96e" stroke-width="1" opacity="0.7"/>
  <line x1="750" y1="58" x2="750" y2="74" stroke="#c9a96e" stroke-width="1" opacity="0.7"/>

  <!-- Subtle corner marks — bottom left -->
  <line x1="50" y1="222" x2="66" y2="222" stroke="#c9a96e" stroke-width="1" opacity="0.7"/>
  <line x1="50" y1="222" x2="50" y2="206" stroke="#c9a96e" stroke-width="1" opacity="0.7"/>

  <!-- Subtle corner marks — bottom right -->
  <line x1="750" y1="222" x2="734" y2="222" stroke="#c9a96e" stroke-width="1" opacity="0.7"/>
  <line x1="750" y1="222" x2="750" y2="206" stroke="#c9a96e" stroke-width="1" opacity="0.7"/>

  <!-- EXOTICS wordmark -->
  <text
    x="400"
    y="162"
    text-anchor="middle"
    font-family="'Helvetica Neue', 'Arial', sans-serif"
    font-weight="200"
    font-size="96"
    letter-spacing="28"
    fill="url(#text-grad)"
    filter="url(#glow-main)"
  >EXOTICS</text>

  <!-- Gold center divider dot -->
  <circle cx="400" cy="188" r="1.5" fill="#c9a96e" opacity="0.9" filter="url(#glow-gold)"/>
  <line x1="330" y1="188" x2="392" y2="188" stroke="#c9a96e" stroke-width="0.5" opacity="0.5"/>
  <line x1="408" y1="188" x2="470" y2="188" stroke="#c9a96e" stroke-width="0.5" opacity="0.5"/>

  <!-- MTL -->
  <text
    x="400"
    y="210"
    text-anchor="middle"
    font-family="'Helvetica Neue', 'Arial', sans-serif"
    font-weight="300"
    font-size="11"
    letter-spacing="10"
    fill="#c9a96e"
    opacity="0.85"
  >MONTRÉAL</text>

</svg>
