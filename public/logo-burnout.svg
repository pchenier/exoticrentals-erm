<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <radialGradient id="bg" cx="50%" cy="60%" r="55%">
      <stop offset="0%" stop-color="#111010"/>
      <stop offset="100%" stop-color="#050505"/>
    </radialGradient>
    <radialGradient id="rim" cx="40%" cy="36%" r="62%">
      <stop offset="0%" stop-color="#2c2c2c"/>
      <stop offset="55%" stop-color="#181818"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </radialGradient>
    <radialGradient id="hub" cx="40%" cy="36%" r="65%">
      <stop offset="0%" stop-color="#252525"/>
      <stop offset="100%" stop-color="#0f0f0f"/>
    </radialGradient>
    <radialGradient id="smoke1" cx="50%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#888888" stop-opacity="0.22"/>
      <stop offset="50%" stop-color="#555555" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#333333" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="smoke2" cx="50%" cy="70%" r="50%">
      <stop offset="0%" stop-color="#aaaaaa" stop-opacity="0.15"/>
      <stop offset="60%" stop-color="#666666" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#444444" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="heat" cx="50%" cy="100%" r="30%">
      <stop offset="0%" stop-color="#c9a96e" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c9a96e" stop-opacity="0"/>
    </radialGradient>
    <filter id="gw">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gg">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="big-blur">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
    <filter id="med-blur">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <filter id="sm-blur">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="motion" x="-20%" y="-10%" width="140%" height="120%">
      <feGaussianBlur stdDeviation="2 0" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9a6e28"/>
      <stop offset="50%" stop-color="#e8d4a0"/>
      <stop offset="100%" stop-color="#9a6e28"/>
    </linearGradient>
    <linearGradient id="spoke-g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1c1c1c"/>
      <stop offset="40%" stop-color="#2e2e2e"/>
      <stop offset="100%" stop-color="#161616"/>
    </linearGradient>
    <clipPath id="wheel-clip">
      <circle cx="540" cy="440" r="330"/>
    </clipPath>
  </defs>

  <!-- BG -->
  <rect width="1080" height="1080" fill="url(#bg)"/>

  <!-- Ground / asphalt subtle line -->
  <rect x="0" y="760" width="1080" height="320" fill="#060606"/>
  <line x1="0" y1="762" x2="1080" y2="762" stroke="#1a1a1a" stroke-width="1.5" opacity="0.7"/>

  <!-- === SMOKE CLOUDS === -->
  <!-- Back smoke (far, wide, faint) -->
  <ellipse cx="380" cy="740" rx="380" ry="130" fill="url(#smoke1)" filter="url(#big-blur)"/>
  <ellipse cx="540" cy="760" rx="320" ry="110" fill="url(#smoke1)" filter="url(#big-blur)"/>
  <!-- Middle smoke -->
  <ellipse cx="460" cy="720" rx="220" ry="90" fill="url(#smoke2)" filter="url(#med-blur)"/>
  <ellipse cx="580" cy="730" rx="200" ry="80" fill="url(#smoke2)" filter="url(#med-blur)"/>
  <!-- Fresh smoke billowing from contact patch -->
  <ellipse cx="540" cy="770" rx="140" ry="55" fill="#999999" opacity="0.12" filter="url(#sm-blur)"/>
  <ellipse cx="520" cy="760" rx="100" ry="40" fill="#bbbbbb" opacity="0.09" filter="url(#sm-blur)"/>
  <ellipse cx="560" cy="758" rx="80" ry="32" fill="#cccccc" opacity="0.07" filter="url(#sm-blur)"/>

  <!-- Heat glow at contact patch -->
  <ellipse cx="540" cy="775" rx="160" ry="30" fill="url(#heat)" filter="url(#sm-blur)"/>

  <!-- Tire rubber marks / skid on ground -->
  <rect x="460" y="758" width="35" height="8" rx="2" fill="#141414" opacity="0.9"/>
  <rect x="505" y="758" width="70" height="8" rx="2" fill="#111111" opacity="0.95"/>
  <rect x="585" y="758" width="40" height="8" rx="2" fill="#131313" opacity="0.85"/>

  <!-- Wheel shadow on ground -->
  <ellipse cx="540" cy="780" rx="280" ry="28" fill="#000000" opacity="0.55" filter="url(#sm-blur)"/>

  <!-- === TIRE === -->
  <circle cx="540" cy="440" r="345" fill="#0c0c0c"/>
  <!-- Tire outer highlight -->
  <circle cx="540" cy="440" r="345" fill="none" stroke="#1c1c1c" stroke-width="28"/>
  <circle cx="540" cy="440" r="332" fill="none" stroke="#101010" stroke-width="2"/>

  <!-- === RIM === -->
  <circle cx="540" cy="440" r="318" fill="url(#rim)" filter="url(#motion)"/>
  <!-- Rim edge -->
  <circle cx="540" cy="440" r="318" fill="none" stroke="#383838" stroke-width="1.5" opacity="0.8"/>
  <circle cx="540" cy="440" r="310" fill="none" stroke="#202020" stroke-width="0.8" opacity="0.5"/>

  <!-- === 5 SPOKES === (with motion blur) -->
  <g clip-path="url(#wheel-clip)" filter="url(#motion)">
    <!-- Spoke 1 (top) -->
    <polygon points="540,440 518,122 562,122" fill="url(#spoke-g)"/>
    <line x1="540" y1="440" x2="518" y2="122" stroke="#353535" stroke-width="1" opacity="0.9"/>
    <line x1="540" y1="440" x2="562" y2="122" stroke="#151515" stroke-width="1" opacity="0.7"/>

    <!-- Spokes 2-5 rotated -->
    <g transform="rotate(72,540,440)">
      <polygon points="540,440 518,122 562,122" fill="url(#spoke-g)"/>
      <line x1="540" y1="440" x2="518" y2="122" stroke="#353535" stroke-width="1" opacity="0.9"/>
      <line x1="540" y1="440" x2="562" y2="122" stroke="#151515" stroke-width="1" opacity="0.7"/>
    </g>
    <g transform="rotate(144,540,440)">
      <polygon points="540,440 518,122 562,122" fill="url(#spoke-g)"/>
      <line x1="540" y1="440" x2="518" y2="122" stroke="#353535" stroke-width="1" opacity="0.9"/>
      <line x1="540" y1="440" x2="562" y2="122" stroke="#151515" stroke-width="1" opacity="0.7"/>
    </g>
    <g transform="rotate(216,540,440)">
      <polygon points="540,440 518,122 562,122" fill="url(#spoke-g)"/>
      <line x1="540" y1="440" x2="518" y2="122" stroke="#353535" stroke-width="1" opacity="0.9"/>
      <line x1="540" y1="440" x2="562" y2="122" stroke="#151515" stroke-width="1" opacity="0.7"/>
    </g>
    <g transform="rotate(288,540,440)">
      <polygon points="540,440 518,122 562,122" fill="url(#spoke-g)"/>
      <line x1="540" y1="440" x2="518" y2="122" stroke="#353535" stroke-width="1" opacity="0.9"/>
      <line x1="540" y1="440" x2="562" y2="122" stroke="#151515" stroke-width="1" opacity="0.7"/>
    </g>
  </g>

  <!-- Inner rim ring -->
  <circle cx="540" cy="440" r="200" fill="#0d0d0d" opacity="0.8"/>
  <circle cx="540" cy="440" r="196" fill="none" stroke="#272727" stroke-width="1.2" opacity="0.8"/>

  <!-- === CENTER HUB === -->
  <circle cx="540" cy="440" r="118" fill="url(#hub)"/>
  <circle cx="540" cy="440" r="118" fill="none" stroke="#2e2e2e" stroke-width="1.5"/>
  <circle cx="540" cy="440" r="106" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.75" filter="url(#gg)"/>

  <!-- ERM logo in hub -->
  <!-- Gold top bar -->
  <rect x="494" y="414" width="92" height="1.2" fill="#c9a96e" opacity="0.9"/>
  <!-- ERM text -->
  <text x="540" y="444"
    text-anchor="middle"
    font-family="'Arial','Helvetica Neue',sans-serif"
    font-weight="700" font-size="30" letter-spacing="8"
    fill="#ffffff" filter="url(#gw)">ERM</text>
  <!-- Gold bottom bar -->
  <rect x="494" y="452" width="92" height="1.2" fill="#c9a96e" opacity="0.9"/>
  <!-- Subtitle -->
  <text x="540" y="468"
    text-anchor="middle"
    font-family="'Arial',sans-serif"
    font-weight="300" font-size="6.5" letter-spacing="3.5"
    fill="#c9a96e" opacity="0.8">EXOTIC RENTALS</text>

  <!-- Center bolt -->
  <circle cx="540" cy="440" r="10" fill="#161616"/>
  <circle cx="540" cy="440" r="8" fill="none" stroke="#2e2e2e" stroke-width="1"/>

</svg>
