<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" width="900" height="900">
  <defs>
    <filter id="g"><feGaussianBlur stdDeviation="20" result="b1"/><feGaussianBlur stdDeviation="6" result="b2"/><feMerge><feMergeNode in="b1"/><feMergeNode in="b2"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="gg"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="900" height="900" fill="#070707"/>
  <!-- Two-line split: EXO / TICS stacked bold -->
  <text x="450" y="400" text-anchor="middle" font-family="'Arial Black','Helvetica Neue',sans-serif" font-weight="900" font-size="160" letter-spacing="8" fill="#ffffff" filter="url(#g)" opacity="0.95">EXO</text>
  <line x1="100" y1="435" x2="800" y2="435" stroke="#c9a96e" stroke-width="1" opacity="0.5"/>
  <text x="450" y="560" text-anchor="middle" font-family="'Arial Black','Helvetica Neue',sans-serif" font-weight="900" font-size="160" letter-spacing="8" fill="#c9a96e" filter="url(#gg)" opacity="0.9">TICS</text>
  <text x="450" y="605" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-weight="200" font-size="11" letter-spacing="16" fill="#ffffff" opacity="0.3">MONTRÉAL</text>
</svg>
