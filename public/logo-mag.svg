<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <filter id="gw"><feGaussianBlur stdDeviation="14" result="b1"/><feGaussianBlur stdDeviation="4" result="b2"/><feMerge><feMergeNode in="b1"/><feMergeNode in="b2"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="skid"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="smoke"><feGaussianBlur stdDeviation="30"/></filter>
    <filter id="gg"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="skid1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2a2a2a" stop-opacity="0"/>
      <stop offset="15%" stop-color="#2e2e2e" stop-opacity="1"/>
      <stop offset="75%" stop-color="#252525" stop-opacity="1"/>
      <stop offset="100%" stop-color="#111" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="skid2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#222" stop-opacity="0"/>
      <stop offset="20%" stop-color="#282828" stop-opacity="0.9"/>
      <stop offset="80%" stop-color="#1e1e1e" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#111" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9a6e28"/>
      <stop offset="40%" stop-color="#e8d4a0"/>
      <stop offset="60%" stop-color="#e8d4a0"/>
      <stop offset="100%" stop-color="#9a6e28"/>
    </linearGradient>
    <radialGradient id="bg-glow" cx="50%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#161412"/>
      <stop offset="100%" stop-color="#060606"/>
    </radialGradient>
  </defs>

  <!-- BG -->
  <rect width="1080" height="1350" fill="url(#bg-glow)"/>

  <!-- Thin outer margin lines -->
  <rect x="48" y="48" width="984" height="1254" fill="none" stroke="#c9a96e" stroke-width="0.5" opacity="0.18"/>

  <!-- Issue / vol top left -->
  <text x="72" y="90" font-family="'Helvetica Neue',Arial,sans-serif" font-weight="200" font-size="9" letter-spacing="5" fill="#c9a96e" opacity="0.4">VOL. I  ·  MONTRÉAL  ·  2025</text>
  <!-- Top right -->
  <text x="1008" y="90" text-anchor="end" font-family="'Helvetica Neue',Arial,sans-serif" font-weight="200" font-size="9" letter-spacing="4" fill="#c9a96e" opacity="0.4">EXOTICS.MTL</text>

  <!-- Horizontal rule top -->
  <line x1="72" y1="104" x2="1008" y2="104" stroke="#c9a96e" stroke-width="0.4" opacity="0.25"/>

  <!-- Smoke haze -->
  <ellipse cx="800" cy="720" rx="320" ry="140" fill="#c9a96e" opacity="0.018" filter="url(#smoke)"/>
  <ellipse cx="750" cy="700" rx="200" ry="90" fill="#ffffff" opacity="0.015" filter="url(#smoke)"/>

  <!-- SKID MARKS — sweeping curves -->
  <path d="M 0 840 Q 350 630 780 700 Q 920 718 1100 670"
    fill="none" stroke="url(#skid1)" stroke-width="30" stroke-linecap="round" filter="url(#skid)"/>
  <path d="M 0 840 Q 350 630 780 700 Q 920 718 1100 670"
    fill="none" stroke="#1e1e1e" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>

  <path d="M 0 910 Q 350 698 780 768 Q 920 786 1100 738"
    fill="none" stroke="url(#skid2)" stroke-width="28" stroke-linecap="round" filter="url(#skid)"/>
  <path d="M 0 910 Q 350 698 780 768 Q 920 786 1100 738"
    fill="none" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Rubber scatter -->
  <g fill="#1c1c1c" opacity="0.6">
    <ellipse cx="300" cy="660" rx="18" ry="5" transform="rotate(-12,300,660)"/>
    <ellipse cx="440" cy="648" rx="12" ry="4" transform="rotate(-14,440,648)"/>
    <ellipse cx="560" cy="655" rx="20" ry="4" transform="rotate(-10,560,655)"/>
    <ellipse cx="680" cy="668" rx="14" ry="4" transform="rotate(-8,680,668)"/>
    <ellipse cx="790" cy="680" rx="9" ry="3" transform="rotate(-6,790,680)"/>
  </g>

  <!-- Pre-headline -->
  <text x="540" y="540" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-weight="200" font-size="11" letter-spacing="10" fill="#c9a96e" opacity="0.7">LUXURY CAR RENTAL</text>

  <!-- EXOTICS — hero wordmark -->
  <text x="540" y="720" text-anchor="middle"
    font-family="'Helvetica Neue','Arial Black',Arial,sans-serif"
    font-weight="800" font-size="168" letter-spacing="8"
    fill="#ffffff" filter="url(#gw)">EXOTICS</text>

  <!-- Gold divider -->
  <line x1="300" y1="760" x2="780" y2="760" stroke="url(#gold)" stroke-width="0.8" opacity="0.8"/>

  <!-- MONTRÉAL -->
  <text x="540" y="800" text-anchor="middle"
    font-family="'Helvetica Neue',Arial,sans-serif"
    font-weight="300" font-size="14" letter-spacing="16"
    fill="#c9a96e" opacity="0.9" filter="url(#gg)">MONTRÉAL</text>

  <!-- Tagline -->
  <text x="540" y="960" text-anchor="middle"
    font-family="'Helvetica Neue',Arial,sans-serif"
    font-weight="200" font-size="16" letter-spacing="3"
    fill="#ffffff" opacity="0.35">Seven machines. One standard. The extraordinary.</text>

  <!-- Bottom rule -->
  <line x1="72" y1="1244" x2="1008" y2="1244" stroke="#c9a96e" stroke-width="0.4" opacity="0.25"/>

  <!-- Bottom credits -->
  <text x="72" y="1265" font-family="'Helvetica Neue',Arial,sans-serif" font-weight="200" font-size="9" letter-spacing="4" fill="#ffffff" opacity="0.2">EXOTICRENTALSMONTREAL.COM</text>
  <text x="1008" y="1265" text-anchor="end" font-family="'Helvetica Neue',Arial,sans-serif" font-weight="200" font-size="9" letter-spacing="4" fill="#ffffff" opacity="0.2">@EXOTICS.MTL</text>

</svg>
