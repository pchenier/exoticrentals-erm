<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" width="900" height="900">
  <defs>
    <filter id="gw"><feGaussianBlur stdDeviation="10" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="gg"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b8923e"/>
      <stop offset="50%" stop-color="#e8d4a0"/>
      <stop offset="100%" stop-color="#a07030"/>
    </linearGradient>
  </defs>
  <rect width="900" height="900" fill="#080808"/>

  <!-- Diamond mark — rotated square outline -->
  <polygon points="450,168 582,300 450,432 318,300" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.9" filter="url(#gg)"/>
  <polygon points="450,188 562,300 450,412 338,300" fill="none" stroke="#c9a96e" stroke-width="0.4" opacity="0.3"/>

  <!-- E inside diamond — built from lines -->
  <line x1="422" y1="270" x2="478" y2="270" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" filter="url(#gw)"/>
  <line x1="422" y1="300" x2="468" y2="300" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" filter="url(#gw)"/>
  <line x1="422" y1="330" x2="478" y2="330" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" filter="url(#gw)"/>
  <line x1="422" y1="270" x2="422" y2="330" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" filter="url(#gw)"/>

  <!-- Thin gold line connecting diamond to text -->
  <line x1="450" y1="440" x2="450" y2="490" stroke="#c9a96e" stroke-width="0.7" opacity="0.5"/>

  <!-- EXOTICS -->
  <text x="450" y="555" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-weight="300" font-size="68" letter-spacing="20" fill="#ffffff" filter="url(#gw)">EXOTICS</text>

  <!-- Gold rule -->
  <line x1="220" y1="580" x2="680" y2="580" stroke="url(#gold)" stroke-width="0.6" opacity="0.6"/>

  <!-- MTL -->
  <text x="450" y="618" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-weight="200" font-size="12" letter-spacing="14" fill="#c9a96e" opacity="0.85" filter="url(#gg)">MONTRÉAL</text>
</svg>
