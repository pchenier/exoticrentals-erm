<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" width="900" height="900">
  <defs>
    <filter id="gw"><feGaussianBlur stdDeviation="12" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="gg"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a07030"/>
      <stop offset="50%" stop-color="#e8d4a0"/>
      <stop offset="100%" stop-color="#a07030"/>
    </linearGradient>
  </defs>
  <rect width="900" height="900" fill="#080808"/>

  <!-- Circular seal -->
  <circle cx="450" cy="350" r="200" fill="none" stroke="#c9a96e" stroke-width="1" opacity="0.5"/>
  <circle cx="450" cy="350" r="186" fill="none" stroke="#c9a96e" stroke-width="0.4" opacity="0.2"/>

  <!-- Tick marks around circle -->
  <g opacity="0.5" stroke="#c9a96e" stroke-width="1">
    <line x1="450" y1="152" x2="450" y2="162"/>
    <line x1="450" y1="538" x2="450" y2="548"/>
    <line x1="252" y1="350" x2="262" y2="350"/>
    <line x1="638" y1="350" x2="648" y2="350"/>
    <line x1="309" y1="209" x2="316" y2="219"/>
    <line x1="591" y1="209" x2="584" y2="219"/>
    <line x1="309" y1="491" x2="316" y2="481"/>
    <line x1="591" y1="491" x2="584" y2="481"/>
  </g>

  <!-- Big E monogram centered -->
  <text x="450" y="400" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-weight="400" font-size="180" fill="#ffffff" filter="url(#gw)" opacity="0.95">E</text>

  <!-- EXOTICS below circle -->
  <text x="450" y="616" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-weight="300" font-size="54" letter-spacing="18" fill="#ffffff" filter="url(#gw)">EXOTICS</text>

  <!-- Gold divider -->
  <line x1="280" y1="638" x2="620" y2="638" stroke="url(#gold)" stroke-width="0.6" opacity="0.7"/>

  <!-- MTL -->
  <text x="450" y="670" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-weight="200" font-size="11" letter-spacing="12" fill="#c9a96e" opacity="0.8">MONTRÉAL</text>
</svg>
